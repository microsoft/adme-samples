        content:
          application/json:
            schema:
              example:
                datasets:
                - a/b/c/dsx01
                - a/b/c/dsx02
              properties:
                datasets:
                  description: Array of datasets inside the subproject.
                  items:
                    type: string
                  type: array
              required:
              - datasets
              type: object

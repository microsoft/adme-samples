  /dataset/tenant/{tenantid}/subproject/{subprojectid}/dataset/{datasetid}/ctagcheck:
    get:
      description: "<ul>\n  <li>Check if the provided dataset cTag match the one stored\
        \ in the metadata catalog.</li>\n  <li>Required roles: subproject.admin, subproject.viewer</li>\n\
        </ul>"
      operationId: dataset-ctag-check
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Name of the tenant.
        in: path
        name: tenantid
        required: true
        schema:
          type: string
      - description: Name of the subproject.
        in: path
        name: subprojectid
        required: true
        schema:
          type: string
      - description: Hierarchical path of the dataset.
        in: query
        name: path
        required: false
        schema:
          type: string
      - description: Name of the dataset.
        in: path
        name: datasetid
        required: true
        schema:
          type: string
      - description: Ctag to be validated.
        in: query
        name: ctag
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                example: 'true'
                type: boolean
          description: Return true if the ctag is valid or false if it is invalid.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Validate if a dataset ctag matches the pre-existing ctag in metadata
        catalog.
      tags:
      - Dataset
  /dataset/tenant/{tenantid}/subproject/{subprojectid}/dataset/{datasetid}/gtags:
    put:
      description: "<ul>\n  <li>Upsert tags to an existing dataset metadata. If the\
        \ dataset metadata already has gtags, then  new gtags are appended to this\
        \ list.</li>\n  <li>Required roles:\n    <ul>\n      <li>subproject.admin:\
        \ if the applied subproject policy is 'uniform'</li>\n      <li>dataset.admin:\
        \ if the applied subproject policy is 'dataset'</li>\n    </ul>\n  </li>\n\
        </ul>\n"
      operationId: dataset-add-tag
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Name of the tenant.
        in: path
        name: tenantid
        required: true
        schema:
          type: string
      - description: Name of the subproject.
        in: path
        name: subprojectid
        required: true
        schema:
          type: string
      - description: Hierarchical path of the dataset.
        in: query
        name: path
        required: false
        schema:
          type: string
      - description: Name of the dataset.
        in: path
        name: datasetid
        required: true
        schema:
          type: string
      - description: Gtags array list.
        explode: true
        in: query
        name: gtag
        required: true
        schema:
          items:
            default: tag1
            type: string
          type: array
      responses:
        '200':
          description: Gtags were upserted to the dataset metadata.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Upsert tags to a dataset.
      tags:
      - Dataset

components:
  parameters:
    DataPartitionId:
      description: Data partition identifier.
      in: header
      name: data-partition-id
      required: true
      schema:
        type: string
    DatasetId:
      description: Name of the dataset.
      in: path
      name: datasetid
      required: true
      schema:
        type: string
    DatasetPath:
      description: Hierarchical path of the dataset.
      in: query
      name: path
      required: false
      schema:
        type: string
    ImpersonationTokenContext:
      description: The impersonation token context (required only with impersonation
        token credentials)
      in: header
      name: impersonation-token-context
      required: false
      schema:
        default: ''
        type: string
    SubProjectId:
      description: Name of the subproject.
      in: path
      name: subprojectid
      required: true
      schema:
        type: string
    TenantId:
      description: Name of the tenant.
      in: path
      name: tenantid
      required: true
      schema:
        type: string
    TranslateUserInfo:
      description: Translate the user-id to a more human readable user info.
      in: query
      name: translate-user-info
      schema:
        default: true
        enum:
        - true
        - false
        type: boolean
  requestBodies:
    DatasetCheckList:
      content:
        application/json:
          schema:
            example:
              datasets:
              - a/b/c/dsx01
              - a/b/c/dsx02
            properties:
              datasets:
                description: Array of datasets inside the subproject.
                items:
                  type: string
                type: array
            required:
            - datasets
            type: object
      description: Request body
      required: true
  responses:
    BadRequest:
      description: Bad request.
    Conflict:
      description: Conflict.
    Forbidden:
      description: Forbidden.
    Locked:
      description: 'Locked. The error message contains the Reason in the form <b>[RCODE:REASON(2-char-code)TTL(sec-number)]</b>.
        Possible Reasons code are: <ul>

        <li>WL (Write Locked).</li>

        <li>RL (Read Locked).</li>

        <li>CL (Cannot be Locked).</li>

        <li>UL (Cannot be Unlocked).</ul>

        For example the reason code <b>[RCODE:RL3600]</b> indicates the dataset is
        Read Locked with a TTL of 3600 seconds.

        '
    NotFound:
      description: Not found.
    Unauthorized:
      description: Unauthorized.
  schemas:
    AbstractDataset:
      description: Schema fragment holding properties common for all datasets.
      properties:
        DatasetProperties:
          description: Placeholder for a specialization.
          example: {}
          title: Dataset Properties
          type: object
        Description:
          description: An optional, textual description of the dataset.
          example: As originally delivered by ACME.com.
          title: Description
          type: string
        EncodingFormatTypeID:
          description: EncodingFormatType ID reference value relationship.
          example: 'namespace:reference-data--EncodingFormatType:text%2Fcsv:'
          pattern: ^[\w\.\-]+:reference-data--EncodingFormatType:[\w\.\-:%]+:[0-9]*$
          title: Encoding Format Type ID
          type: string
        Endian:
          description: 'Endianness of binary value. Enumeration: "BIG", "LITTLE".'
          enum:
          - BIG
          - LITTLE
          type: string
        Name:
          description: An optional name of the dataset.
          example: Dataset X221/15
          title: Name
          type: string
        SchemaFormatTypeID:
          description: Relationship to the SchemaFormatType reference value.
          example: 'namespace:reference-data--SchemaFormatType:CWLS%20LAS3:'
          pattern: ^[\w\.\-]+:reference-data--SchemaFormatType:[\w\.\-:%]+:[0-9]*$
          title: Schema Format Type ID
          type: string
        TotalSize:
          description: Total size of the dataset in bytes.
          example: '13245217273'
          pattern: '[0-9]+'
          title: Total Size
          type: string
      required:
      - DatasetProperties
      title: AbstractDataset
      type: object
    AbstractFileCollection:
      description: The schema fragment representing file collections.
      properties:
        DatasetProperties:
          description: The dataset properties for a file collection.
          properties:
            Checksum:
              description: MD5 checksum of file bytes.
              pattern: ^[0-9a-fA-F]{32}
              title: MD5 Checksum
              type: string
            FileCollectionPath:
              description: The mandatory path to the file collection.
              example: s3://default_bucket/opendes/data/vds-dataset/
              title: File Collection Path
              type: string
            FileSourceInfos:
              description: Array of file collection members as FileSourceInfo.
              items:
                description: A schema fragment to describe file source information.
                properties:
                  Checksum:
                    description: Checksum of file bytes.
                    pattern: ^([0-9a-fA-F]{2})+$
                    title: Checksum
                    type: string
                  ChecksumAlgorithm:
                    description: The name of the checksum algorithm.
                    example: SHA-256
                    title: Checksum Algorithm
                    type: string
                  FileSize:
                    description: Length of file in bytes.
                    example: '95463'
                    pattern: ^[0-9]+$
                    title: File Size
                    type: string
                  FileSource:
                    description: The location of the file.
                    example: s3://default_bucket/r1/data/provided/documents/1000.witsml
                    title: File Source
                    type: string
                  Name:
                    description: Optional, user-friendly file name.
                    example: 1000.witsml
                    title: Name
                    type: string
                  PreloadFileCreateDate:
                    description: Optional create date and time of the file.
                    example: '2019-12-16T11:46:20.163Z'
                    format: date-time
                    title: Preload File Create Date
                    type: string
                  PreloadFileCreateUser:
                    description: Optional user name who created the file.
                    example: somebody@acme.org
                    title: Preload File Create User
                    type: string
                  PreloadFileModifyDate:
                    description: Optional last modified date of the file.
                    example: '2019-12-20T17:20:05.356Z'
                    format: date-time
                    title: Preload File Modify Date
                    type: string
                  PreloadFileModifyUser:
                    description: Optional user who last modified the file.
                    example: somebody.else@acme.org
                    title: Preload File Modify User
                    type: string
                  PreloadFilePath:
                    description: File system path to the data file before loading.
                    example: s3://staging-area/r7/raw-data/provided/documents/1000.witsml
                    title: Preload File Path
                    type: string
                required:
                - FileSource
                title: FileSourceInfo
                type: object
              title: File Source Info Array
              type: array
            IndexFilePath:
              description: An optional path to an index file.
              example: s3://default_bucket/opendes/data/vds-dataset/vds-dataset.index
              title: Index File Path
              type: string
          required:
          - FileCollectionPath
          title: Dataset Properties
          type: object
      required:
      - DatasetProperties
      title: AbstractFileCollection
      type: object
    AccessControlList:
      additionalProperties: false
      description: The access control tags associated with this entity.
      properties:
        owners:
          description: The list of owners of this data record.
          items:
            pattern: ^[a-zA-Z0-9_+&*-]+(?:\.[a-zA-Z0-9_+&*-]+)*@(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,7}$
            type: string
          title: List of Owners
          type: array
        viewers:
          description: The list of viewers to which this data record is accessible.
          items:
            pattern: ^[a-zA-Z0-9_+&*-]+(?:\.[a-zA-Z0-9_+&*-]+)*@(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,7}$
            type: string
          title: List of Viewers
          type: array
      required:
      - owners
      - viewers
      title: Access Control List
      type: object
    AccessToken:
      example:
        access_token: header.payload.signature
        expires_in: 3600
        token_type: Bearer
      properties:
        access_token:
          description: connection string credentials or standard access token (CSP
            dependent)
          type: string
        expires_in:
          description: expiration time (in minutes) of the connection string credentials
          type: number
        token_type:
          description: token type (Bearer, SasUrl, ....).
          type: string
      required:
      - access_token
      - token_type
      - expires_in
      type: object
    Acls:
      description: ACLs with admin groups and viewer groups.
      properties:
        admins:
          items:
            type: string
          type: array
        viewers:
          items:
            type: string
          type: array
      type: object
    AnalyticsConnectionString:
      example:
        access_token: sv=2021-06-08&ss=b&srt=sco&sp=rl&se=...
        expires_in: 3599
        token_type: SasUrl
      properties:
        access_token:
          description: Storage access token or SAS connection string for downloading
            analytics reports.
          type: string
        expires_in:
          description: Expiration time for the returned storage credentials in seconds.
          type: number
        token_type:
          description: Credential type returned by the cloud provider, for example
            Bearer or SasUrl.
          type: string
      required:
      - access_token
      - expires_in
      - token_type
      type: object
    AnalyticsJob:
      example:
        first_execution: 1775260800000
        freq_execution: 1
        name: north-sea-survey
        statistics: sz,th
        type: subproject
      properties:
        first_execution:
          description: UTC timestamp (milliseconds) of the next planned execution.
            This value is computed from AnalyticsJobInput.first_execution when the
            analytics job configuration is created or updated.
          format: int64
          type: integer
        freq_execution:
          description: Number of days between analytics job executions.
          type: integer
        name:
          description: Subproject name for a subproject-level configuration, or tenant
            partition ID for a tenant-level configuration.
          type: string
        statistics:
          description: Comma-separated metric codes to include in the analytics report.
          type: string
        type:
          description: Scope of the analytics job configuration.
          enum:
          - subproject
          - partition
          type: string
      type: object
    AnalyticsJobInput:
      example:
        first_execution: 7
        freq_execution: 7
        name: north-sea-survey
        statistics: SZ
      properties:
        first_execution:
          description: Requested weekday for the first execution using the current
            implementation mapping (1=Sunday, 2=Monday, ..., 7=Saturday). The service
            converts this value to the next scheduled UTC timestamp before persisting
            and returning the schedule. Defaults to today.
          maximum: 7
          minimum: 1
          type: integer
        freq_execution:
          description: Number of days between analytics job executions. Defaults to
            7 (weekly).
          minimum: 1
          type: integer
        name:
          description: Subproject name. If empty or omitted, the analytics job configuration
            is created at the tenant level.
          type: string
        statistics:
          description: 'Comma-separated statistics codes. Supported values: OB=object
            count, SZ=total size, TH=hot tier size, TC=cool tier size, TD=cold tier
            size, TA=archive tier size, TU=unknown tier size, HN=touched object count,
            HS=touched object size, CB=created_by, CT=creation time, LA=last accessed
            time, LM=last modified time, LT=last modified tier time. Example: OB,SZ.'
          type: string
      required:
      - statistics
      type: object
    ChangeTierOperationStatus:
      example:
        completed_cnt: 1994
        created_at: '2026-03-10T08:00:00Z'
        created_by: user_oid
        cursor: ZXlKamIyNTBhVzUxWVhScGIyNVViMnRsYmlJNkltVjRZVzF3YkdVaWZRPT0
        dataset_cnt: 2000
        failed_cnt: 6
        failed_datasets:
        - error: Failed to change tier for 12 blob(s)

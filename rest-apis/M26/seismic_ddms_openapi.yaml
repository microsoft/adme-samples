openapi: 3.0.0
paths:
  /analytics/job:
    get:
      description: "<ul>\n  <li><b>Preview:</b> This feature is available on request.\
        \ To enable it, create a support request in the Azure portal for Azure Data\
        \ Manager for Energy. See the <a href=\"https://learn.microsoft.com/en-us/azure/energy-data-services/faq-energy-data-services#how-do-i-raise-a-support-request-for-azure-data-manager-for-energy\"\
        >official support guidance</a>.</li>\n  <li>Description: List all analytics\
        \ job configurations. Each configuration defines which report metrics are\
        \ generated and how often reports are produced. Tenant admins see all configurations;\
        \ subproject admins see only their subproject configurations.</li>\n  <li>Roles:\
        \ tenant.admin, data.manager, or subproject.admin</li>\n</ul>"
      operationId: analytics-list-schedules
      parameters:
      - description: Data partition identifier.
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
              - first_execution: 1775260800000
                freq_execution: 1
                name: north-sea-survey
                statistics: sz,th
                type: subproject
              schema:
                items:
                  example:
                    first_execution: 1775260800000
                    freq_execution: 1
                    name: north-sea-survey
                    statistics: sz,th
                    type: subproject
                  properties:
                    first_execution:
                      description: UTC timestamp (milliseconds) of the next planned
                        execution. This value is computed from AnalyticsJobInput.first_execution
                        when the analytics job configuration is created or updated.
                      format: int64
                      type: integer
                    freq_execution:
                      description: Number of days between analytics job executions.
                      type: integer
                    name:
                      description: Subproject name for a subproject-level configuration,
                        or tenant partition ID for a tenant-level configuration.
                      type: string
                    statistics:
                      description: Comma-separated metric codes to include in the
                        analytics report.
                      type: string
                    type:
                      description: Scope of the analytics job configuration.
                      enum:
                      - subproject
                      - partition
                      type: string
                  type: object
                type: array
          description: List of analytics job configurations.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
      summary: List all analytics job configurations. (Preview)
      tags:
      - Analytics
    put:
      description: "<ul>\n  <li><b>Preview:</b> This feature is available on request.\
        \ To enable it, create a support request in the Azure portal for Azure Data\
        \ Manager for Energy. See the <a href=\"https://learn.microsoft.com/en-us/azure/energy-data-services/faq-energy-data-services#how-do-i-raise-a-support-request-for-azure-data-manager-for-energy\"\
        >official support guidance</a>.</li>\n  <li>Description: Create or update\
        \ an analytics job configuration. The configuration defines which metrics\
        \ to include in the analytics report and how often the job runs. The request\
        \ body must be a single-element array. If the element name is empty, it creates\
        \ a tenant-level configuration; otherwise it creates a subproject-level configuration.</li>\n\
        \  <li>The request field <code>first_execution</code> is a weekday selector\
        \ (1-7). The response field <code>first_execution</code> is the computed next\
        \ execution time in UTC milliseconds.</li>\n  <li>Roles: tenant.admin or data.manager\
        \ (tenant-level configuration), subproject.admin (subproject-level configuration)</li>\n\
        </ul>"
      operationId: analytics-create-schedule
      parameters:
      - description: Data partition identifier.
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            example:
            - first_execution: 7
              freq_execution: 7
              name: north-sea-survey
              statistics: SZ
            schema:
              items:
                example:
                  first_execution: 7
                  freq_execution: 7
                  name: north-sea-survey
                  statistics: SZ
                properties:
                  first_execution:
                    description: Requested weekday for the first execution using the
                      current implementation mapping (1=Sunday, 2=Monday, ..., 7=Saturday).

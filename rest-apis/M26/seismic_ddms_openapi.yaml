          sdpath: sd://opendes/project-alpha/seismic/survey-2024-002
        - error: Failed to acquire lock
          sdpath: sd://opendes/project-alpha/seismic/survey-2024-003
        - error: Dataset has no associated storage location
          sdpath: sd://opendes/project-alpha/seismic/survey-2024-004
        - error: Dataset storage location has invalid format
          sdpath: sd://opendes/project-alpha/seismic/survey-2024-005
        - error: Tier changed but metadata update failed after retries
          sdpath: sd://opendes/project-alpha/seismic/survey-2024-006
        last_updated_at: '2026-03-10T08:45:00Z'
        operation_id: 9a8f2e31-4c67-4b8a-b123-abcdef123456
        status: CompletedWithErrors
        target_tier: Cool
      properties:
        completed_cnt:
          description: Number of datasets correctly processed.
          type: integer
        created_at:
          description: Time when the operation was initiated.
          type: string
        created_by:
          description: User who initiated the operation job.
          type: string
        cursor:
          description: Base64 URL-safe encoded cursor to retrieve the next page of
            failed datasets. Present only if there are more failures to fetch.
          type: string
        dataset_cnt:
          description: Total number of datasets to process.
          type: integer
        failed_cnt:
          description: Number of datasets which processing failed.
          type: integer
        failed_datasets:
          description: Array of failed datasets with error details. Only included
            when show_details=true and failed_cnt > 0.
          items:
            example:
              error: Failed to change tier for 12 blob(s)
              sdpath: sd://opendes/project-alpha/seismic/survey-2024-001
            properties:
              error:
                description: Error message describing why the dataset operation failed.
                type: string
              sdpath:
                description: The SDMS path of the dataset that failed (format sd://tenant/subproject/path/dataset).
                type: string
            required:
            - sdpath
            - error
            type: object
          type: array
        last_updated_at:
          description: Time when the operation status was last updated.
          type: string
        operation_id:
          description: Operation id of the operation job.
          type: string
        status:
          description: 'Status of the operation job. Possible values:

            - **NotStarted**: The operation has been accepted and is waiting to be
            processed.

            - **InProgress**: The operation is currently being processed.

            - **Completed**: The operation has finished successfully with all datasets
            processed.

            - **CompletedWithErrors**: The operation has finished but some datasets
            failed to process.

            '
          enum:
          - NotStarted
          - InProgress
          - Completed
          - CompletedWithErrors
          type: string
        target_tier:
          description: 'Target storage tier for change-tier operations. Supported
            tiers:

            - **Hot**: Optimized for frequent access. Highest storage cost, lowest
            access cost.

            - **Cool**: Optimized for infrequent access. Lower storage cost, higher
            access cost.

            - **Cold**: Optimized for rare access. Lowest storage cost, highest access
            cost.

            '
          enum:
          - Hot
          - Cool
          - Cold
          type: string
      required:
      - operation_id
      - status
      type: object
    CommonResources:
      description: Common resources to be injected at root 'data' level.
      properties:
        ExistenceKind:
          description: Where does this data resource sit in the cradle-to-grave span

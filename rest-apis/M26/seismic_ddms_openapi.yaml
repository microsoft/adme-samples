  /utility/cp:
    post:
      description: "<ul>\n<li>Copy a seismic store dataset. The source and destination\
        \ dataset must be in the same sub-project.</li>\n<li>Required roles:\n  <ul>\n\
        \    <li>subproject.admin, subproject.viewer: if the applied subproject policy\
        \ is 'uniform'</li>\n    <li>dataset.admin, dataset.viewer: if the applied\
        \ subproject policy is 'dataset'</li>\n  </ul>\n</li>\n</ul>\n"
      operationId: utility-cp
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Seismic store source dataset path.
        in: query
        name: sdpath_from
        required: true
        schema:
          type: string
      - description: Seismic store destination dataset path.
        in: query
        name: sdpath_to
        required: true
        schema:
          type: string
      - description: Lock source and destination while copying.
        in: query
        name: lock
        required: false
        schema:
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
          description: Copy operation succeeded.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
        '409':
          description: Conflict.
        '423':
          description: 'Locked. The error message contains the Reason in the form
            <b>[RCODE:REASON(2-char-code)TTL(sec-number)]</b>. Possible Reasons code
            are: <ul>

            <li>WL (Write Locked).</li>

            <li>RL (Read Locked).</li>

            <li>CL (Cannot be Locked).</li>

            <li>UL (Cannot be Unlocked).</ul>

            For example the reason code <b>[RCODE:RL3600]</b> indicates the dataset
            is Read Locked with a TTL of 3600 seconds.

            '
      summary: Copy dataset.
      tags:
      - Utility
  /utility/download-connection-string:
    get:
      description: "<ul>\n  <li>Generate the download connection credential string\
        \ for a subproject collection or a dataset, depending of the applied access\
        \ policy (uniform/dataset).</li>\n  <li>These credentials can be used via\
        \ CSP SDK, on client side, to perform bulk download.</li>\n  <li>\n    The\
        \ endpoint response is CSP (Cloud Solution Provider) dependent:\n    <ul>\n\
        \      <br/><li><b>Azure</b>: shared access signature (SaS) Url token\n  \
        \    <br/>\n        <br/>{\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;access_token:\
        \ 'https://{accountName}.blob.core.windows.net/{containerName}?{SASQueryParameters}`'\n\
        \          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;expires_in: 3599\n   \
        \       <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;token_type: 'SasUrl'\n  \
        \      <br/>}\n      <br/><br/></li>\n      <li><b>Google</b>: standard access\
        \ token credential signed and down-scoped by google\n      <br/>\n       \
        \ <br/>{\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;access_token:\
        \ 'google_signed_access_token'\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;expires_in:\
        \ 3600\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;token_type: 'Bearer'\n\
        \        <br/>}\n      <br/><br/></li>\n      <li><b>AWS</b>: double column\
        \ separated string containing access key id, the access key secret and the\
        \ session token\n      <br/>\n        <br/>{\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;access_token:\
        \ 'accessKeyId:secretAccessKey:sessionToken'\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;expires_in:\
        \ 3599\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;token_type: 'Bearer'\n\
        \        <br/>}\n      <br/><br/></li>\n      <li><b>IBM</b>: double column\
        \ separated string containing access key id, the access key secret and the\
        \ session token\n      <br/>\n        <br/>{\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;access_token:\
        \ 'accessKeyId:secretAccessKey:sessionToken'\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;expires_in:\
        \ 7200\n          <br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;token_type: 'Bearer'\n\
        \        <br/>}\n      <br/><br/></li>\n    </ul>\n  </li>\n  <li>Required\
        \ roles:\n    <ul>\n      <li>subproject.admin, subproject.viewer: if the\
        \ applied subproject policy is 'uniform'</li>\n      <li>dataset.admin, dataset.viewer:\
        \ if the applied subproject policy is 'dataset'</li>\n    </ul>\n  </li>\n\
        </ul>"
      operationId: utility-download-connection-string
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Seismic store path in the format sd://tenant/subproject (for
          uniform applied policies) or sd://tenant/subproject/dataset (for dataset
          applied policies)
        in: query
        name: sdpath
        required: true
        schema:
          default: sd://opendes/sandbox
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                  access_token: header.payload.signature
                  expires_in: 3600
                  token_type: Bearer
                properties:
                  access_token:
                    description: connection string credentials or standard access
                      token (CSP dependent)
                    type: string
                  expires_in:
                    description: expiration time (in minutes) of the connection string
                      credentials
                    type: number
                  token_type:
                    description: token type (Bearer, SasUrl, ....).
                    type: string
                required:
                - access_token
                - token_type
                - expires_in
                type: object
          description: The download connection credential string.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Generate the download connection credentials string
      tags:
      - Utility

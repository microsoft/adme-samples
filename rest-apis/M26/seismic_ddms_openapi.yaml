            \ API returns `200 OK` with the updated\n    metadata as soon as the metadata\
            \ patch succeeds, *before* the\n    underlying cloud-storage tier transition\
            \ has completed.\n  - No operation id, no progress polling, no per-blob\
            \ failure detail\n    through this endpoint. Failures are visible only\
            \ in server logs.\n  - Honored only when `FEATURE_FLAG_ENABLE_CHANGE_TIER`\
            \ is enabled;\n    when disabled the request is rejected with\n    `403\
            \ PERMISSION_DENIED`.\n  - Write-only: the response body never echoes\
            \ it back. The current\n    tier of the dataset is exposed as the read-only\n\
            \    `filemetadata.tier_class` field on the GET response.\n\nFor tier\
            \ changes that need progress tracking, use the change-tier\noperation\
            \ (`PUT /operation/change-tier`) and poll its status with\n`GET /operation/change-tier`.\n"

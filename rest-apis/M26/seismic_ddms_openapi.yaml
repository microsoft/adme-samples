        name: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deletion of user from a subproject.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Remove a user from a subproject.
      tags:
      - Users
    get:
      description: "<ul>\n  <li>List users in subproject's role-based authorization\
        \ groups.</li>\n  <li>Required roles: subproject.admin</li>\n</ul>"
      operationId: user-list
      parameters:
      - description: Seismic store path, sd://tenant/sub-project.
        in: query
        name: sdpath
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                example:
                - - userA@email
                  - admin
                - - userB@email
                  - viewer
                items:
                  example:
                  - userA@email
                  - admin
                  items:
                    type: string
                  type: array
                type: array
          description: Retrieved sub-project users in admin and viewer groups successfully.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: List users in a subproject's role-based authorization groups.
      tags:
      - Users
    put:
      description: "<ul>\n  <li>Add a user to a subproject default authorization group\
        \ if it exists, otherwise, add the user to the first group.</li>\n  <li>Required\
        \ roles: subproject.admin</li>\n</ul>"
      operationId: user-add
      requestBody:
        content:
          application/json:
            schema:
              example:
                email: test@slb.com
                group: admin
                path: sd://slb/test_project
              properties:
                email:
                  description: Email address of the user. Note that this field is
                    used as a principal identifier for entitlements-svc and can be
                    configured using the env variable USER_ID_CLAIM_FOR_ENTITLEMENTS_SVC
                    in the Seismic DMS runtime.
                  type: string
                group:
                  description: Role to be assigned to the user.
                  enum:
                  - viewer
                  - admin
                  type: string
                path:
                  description: Seismic store path in the format sd://tenant/subproject.
                  type: string
              required:
              - email
              - path
              - group
              type: object
        description: Request body
        required: true
      responses:
        '200':
          description: User was successfully added to a sub-project authorization
            group.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Add a user to a seismic store subproject authorization group.
      tags:
      - Users

      summary: Retrieve the dataset metadata.
      tags:
      - Dataset
    patch:
      description: "<ul>\n  <li>Update the dataset meta information in the seismic\
        \ store or close (unlock) the dataset. If the endpoint is used without the\
        \ close parameter, at least one body field is required or the endpoint will\
        \ return an error.</li>\n  <li>Required roles:\n    <ul>\n      <li>subproject.admin:\
        \ if the applied subproject policy is 'uniform'</li>\n      <li>dataset.admin:\
        \ if the applied subproject policy is 'dataset'</li>\n    </ul>\n  </li>\n\
        \  <li>Patchable fields:\n    <ul>\n      <li><b>dataset_new_name:</b> new\
        \ name to use for the dataset (rename).</li>\n      <li><b>filemetadata:</b>\
        \ Seismic-store specific field describing how the physical data is stored\
        \ in cloud storage (GCS / Azure Container / S3). Primarily used by client\
        \ libraries to reconstruct the dataset. Example for a truncated dataset of\
        \ N objects of 64 MB each: <pre>{nObject: N, totalSize: 1024, objsize: 64,\
        \ sizeUnit: MB}</pre>\n        <ul>\n          <li>The nested field <b>filemetadata.tier_class</b>\
        \ is <b>read-only</b>. Any value supplied for it is dropped when the patch\
        \ is applied, and it cannot be used on its own to trigger a tier change.</li>\n\
        \        </ul>\n      </li>\n      <li><b>change_tier:</b> Requests a storage-tier\
        \ change for the dataset. Accepted values: <code>Hot</code>, <code>Cool</code>,\
        \ <code>Cold</code>. See the NOTE below and the feature-flag and validation\
        \ sections for behavior details.</li>\n      <li><b>gtags:</b> Upsert tags\
        \ to an existing dataset metadata. If the dataset metadata already has gtags,\
        \ the new gtags are appended to the existing list.</li>\n      <li><b>ltag:</b>\
        \ Update the existing legalTag value.</li>\n      <li><b>readonly:</b> Update\
        \ the dataset mode to readonly (true) or to read/write (false).</li>\n   \
        \   <li><b>status:</b> Update the dataset status.</li>\n    </ul>\n  </li>\n\
        \  <li><b>Feature flags affecting this endpoint:</b>\n    <ul>\n      <li><b>FEATURE_FLAG_ENABLE_CHANGE_TIER</b>\
        \ &mdash; when disabled, any PATCH supplying <b>change_tier</b> is rejected\
        \ with <code>403 PERMISSION_DENIED</code>.</li>\n      <li><b>FEATURE_FLAG_SEISMICMETA_STORAGE</b>\
        \ &mdash; controls persistence of the storage-record body field (<b>seismicmeta</b>,\
        \ or one of the supported alternates such as <b>openzgy_v1</b> / <b>segy_v1</b>).\
        \ When disabled, the field is still validated and reflected in the dataset\
        \ metadata, but the record is <i>not</i> persisted to the underlying storage\
        \ service.</li>\n    </ul>\n  </li>\n  <li><b>Validation rules for <code>change_tier</code>\
        \ and <code>filemetadata.tier_class</code>:</b>\n    <ul>\n      <li>If only\
        \ <b>change_tier</b> is supplied, the tier change proceeds and the response\
        \ <b>filemetadata.tier_class</b> reflects the requested tier.</li>\n     \
        \ <li>If both <b>change_tier</b> and <b>filemetadata.tier_class</b> are supplied\
        \ and they have the <i>same</i> value, the tier change proceeds.</li>\n  \
        \    <li>If both are supplied and the values <i>differ</i>, the request is\
        \ rejected with <code>400 BAD_REQUEST</code>.</li>\n      <li>If only <b>filemetadata.tier_class</b>\
        \ is supplied (without <b>change_tier</b>), the value is dropped when copying\
        \ <b>filemetadata</b> to the stored record &mdash; no tier change is triggered.\
        \ To change the tier, use <b>change_tier</b>.</li>\n    </ul>\n  </li>\n \
        \ <li><b>NOTE:</b> <code>last_modified_date</code> is updated automatically\
        \ on every metadata change made through this endpoint.</li>\n  <li><b>NOTE:</b>\
        \ the <b>change_tier</b> field on this endpoint is fire-and-forget. A successful\
        \ <code>200 OK</code> indicates that the metadata patch succeeded; it does\
        \ <i>not</i> indicate that the underlying cloud-storage tier transition has\
        \ completed. After the call, issue a <code>GET</code> on the dataset to observe\
        \ the eventual <b>filemetadata.tier_class</b>.</li>\n  <li><b>Recommended\
        \ approach for tier changes:</b> for production workloads that need an observable,\
        \ long-running operation with progress tracking, use the change-tier operation\
        \ (<code>PUT /operation/change-tier</code>) and poll its status with <code>GET\
        \ /operation/change-tier</code> instead of the fire-and-forget <b>change_tier</b>\
        \ field on this endpoint.</li>\n</ul>\n"
      operationId: dataset-patch
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Name of the tenant.
        in: path
        name: tenantid
        required: true
        schema:
          type: string
      - description: Name of the subproject.
        in: path
        name: subprojectid
        required: true
        schema:
          type: string
      - description: Hierarchical path of the dataset.
        in: query
        name: path
        required: false
        schema:
          type: string
      - description: Name of the dataset.
        in: path
        name: datasetid
        required: true
        schema:
          type: string
      - description: Non null sbit value of the dataset. Using this value here will
          close the dataset.
        in: query
        name: close
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            examples:
              changeTier:
                description: 'The `change_tier` field is honored only when the

                  `FEATURE_FLAG_ENABLE_CHANGE_TIER` server flag is enabled;

                  otherwise the request is rejected with `403 PERMISSION_DENIED`.

                  The API returns `200 OK` as soon as the metadata patch

                  succeeds; the underlying cloud-storage tier transition runs in

                  the background with no operation id and no progress polling.

                  For tier changes that need progress tracking, use the

                  change-tier operation: `PUT /operation/change-tier`.

                  '
                summary: Request a storage-tier change (fire-and-forget)
                value:
                  change_tier: Cool
              legalTag:
                summary: Update legal tag
                value:
                  ltag: opendes-public-usa-dataset-1
              readonlyToggle:
                summary: Mark dataset readonly
                value:
                  readonly: true
              rename:
                description: 'Rename only. No other side-effects. Returns the updated
                  dataset

                  metadata synchronously.

                  '
                summary: Rename a dataset
                value:
                  dataset_new_name: dataset-renamed
              renameAndChangeTier:
                description: 'Rename is applied synchronously; tier change is dispatched

                  fire-and-forget as described above.

                  '
                summary: Combined rename + tier change
                value:
                  change_tier: Cold
                  dataset_new_name: dataset-renamed
              tags:
                description: 'Appends `gtags` to the existing list (upsert semantics).

                  '
                summary: Add gtags to a dataset
                value:
                  gtags:
                  - basin-north-sea
                  - vintage-2024
            schema:
              description: "Request body for the PATCH dataset operation. At least\
                \ one field is required\nunless the `close` query parameter is used.\
                \ Most fields are independent, but:\n  - `dataset_new_name` and `change_tier`\
                \ may be combined in a single request;\n    the rename is applied\
                \ synchronously while the tier change is dispatched\n    as a fire-and-forget\
                \ background operation.\n  - `filemetadata.tier_class` is read-only\
                \ and is ignored if supplied.\n"

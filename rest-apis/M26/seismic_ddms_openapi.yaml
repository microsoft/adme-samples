  /utility/ls:
    get:
      description: '<ul>

        <li>Return the list of datasets and sub-directories of a seismic store path.</li>

        <li>Required roles: subproject.admin, subproject.viewer</li></ul>

        '
      operationId: utility-ls-get
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      - description: Seismic store path, sd://tenant/sub-project/path.
        in: query
        name: sdpath
        required: true
        schema:
          type: string
      - description: Working mode, dirs or datasets or undefined for both.
        in: query
        name: wmode
        required: false
        schema:
          type: string
      - description: Limits the total number of datasets to return.
        in: query
        name: limit
        required: false
        schema:
          type: number
      - description: Pagination token - this query parameter can be omitted on first
          call.
        in: query
        name: cursor
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Array of directories and datasets inside a subproject.
                example:
                - folderA/
                - folderB/
                - dataset01
                - dataset02
                - dataset03
                items:
                  type: string
                type: array
          description: Seismic store path content.
        '201':
          content:
            application/json:
              schema:
                example:
                  datasets:
                  - folderA/
                  - folderB/
                  - dataset01
                  nextPageCursor: abc1234
                properties:
                  datasets:
                    description: Array of datasets inside the subproject.
                    items:
                      type: string
                    type: array
                  nextPageCursor:
                    description: Next cursor for pagination.
                    type: string
                required:
                - datasets
                - nextPageCursor
                type: object
          description: Paginated seismic store path content - For documentation purposes,
            if limit or cursor is given, status code here is 200.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Retrieve the list of datasets and sub-directories inside a seismic
        store path.
      tags:
      - Utility
    post:
      description: '<ul>

        <li>Return the list of datasets and sub-directories of a seismic store path.</li>

        <li>Required roles: subproject.admin, subproject.viewer</li></ul>

        '
      operationId: utility-ls-post
      parameters:
      - description: The impersonation token context (required only with impersonation
          token credentials)
        in: header
        name: impersonation-token-context
        required: false
        schema:
          default: ''
          type: string
      requestBody:
        content:
          application/json:
            schema:
              example:
                cursor: next-page-token-931fvm19vm1-vm1v1
                limit: 10
                sdpath: sd://test-tenant/test-subproject/test-path
                wmode: all
              properties:
                cursor:
                  description: the next page cursor.
                  type: string
                limit:
                  description: the max response datasets number.
                  type: number
                sdpath:
                  description: 'the seismic dms path uri: sd://tenant or sd://tenant/subproject
                    or sd://tenant/subproject/path.'
                  type: string
                wmode:
                  description: 'the endpoint working mode: dirs, datasets, all (default
                    if not specified).'
                  type: string
              required:
              - sdpath
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Array of directories and datasets inside a subproject.
                example:
                - folderA/
                - folderB/
                - dataset01
                - dataset02
                - dataset03
                items:
                  type: string
                type: array
          description: Seismic store path content.
        '201':
          content:
            application/json:
              schema:
                example:
                  datasets:
                  - folderA/
                  - folderB/
                  - dataset01
                  nextPageCursor: abc1234
                properties:
                  datasets:
                    description: Array of datasets inside the subproject.
                    items:
                      type: string
                    type: array
                  nextPageCursor:
                    description: Next cursor for pagination.
                    type: string
                required:
                - datasets
                - nextPageCursor
                type: object
          description: Paginated seismic store path content - For documentation purposes,
            if limit or cursor is given, status code here is 200.
        '400':
          description: Bad request.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden.
        '404':
          description: Not found.
      summary: Retrieve the list of datasets and sub-directories inside a seismic
        store path.
      tags:
      - Utility

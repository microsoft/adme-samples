paths:
  /api/rafs-ddms/dev/samplesanalysis/{analysis_type}/search:
    get:
      description: 'Get the (`samples analysis`) ids list that comply with `{query}`
        for given`{analysis_type}`. <br><br>            Use the `Accept` request header
        to specify content schema version                 (example header `Accept:
        */*;version=1.0.0` is supported).<br><br>            The  `columns_filter`,
        `rows_filter`, and  `columns_aggregation`                 query parameters
        can be used to manage data in response. <br><br>             Use `offset`,
        `page_limit` query parameters to control response data size.                 The
        `page_limit` and `total_size (found in response)` refers to the number of
        parquet files read.<br><br>        Required roles: `users.datalake.viewers`
        or `users.datalake.editors` or `users.datalake.admins`.<br>         In addition,
        users must be members of a data group(ACL) to access the data.'
      operationId: get_search_api_rafs_ddms_dev_samplesanalysis__analysis_type__search_get
      parameters:
      - in: path
        name: analysis_type
        required: true
        schema:
          title: Analysis Type
          type: string
      - description: A valid json array of property names
        examples:
          example:
            value: '["ColumnName1[.FieldName1]", "ColumnName2[.FieldName2]"]'
        in: query
        name: columns_filter
        required: false
        schema:
          description: A valid json array of property names
          title: Columns Filter
          type: string
      - description: A valid json object with property name, operator and value
        examples:
          example:
            value: '{"PropertyX[.PropertyXFieldA]": {"$gt": "{Value}"}}'
        in: query
        name: rows_filter
        required: false
        schema:
          description: A valid json object with property name, operator and value
          title: Rows Filter
          type: string
      - description: A valid json array with property name and aggregator function
        examples:
          example:
            value: '["ColumnName[.FieldName]", "function"]'
        in: query
        name: columns_aggregation
        required: false
        schema:
          description: A valid json array with property name and aggregator function
          title: Columns Aggregation
          type: string
      - description: A valid json object with combined rows filters with optional
          $or and $and keys
        examples:
          example:
            value: '{"$and": [{"PropertyX[.PropertyXFieldA]": {"$gt": "{Value}"}},
              {"$or": [{"PropertyY[.PropertyYFieldB]": {"$eq": "{Value}"}}, {"PropertyZ[.PropertyZFieldC]":
              {"$le": "{Value}"}}]}]}'
        in: query
        name: rows_multiple_filter
        required: false
        schema:
          description: A valid json object with combined rows filters with optional
            $or and $and keys
          title: Rows Multiple Filter
          type: string
      - examples:
          example:
            value: 1000
        in: query
        name: page_limit
        required: false
        schema:
          default: 1000
          exclusiveMinimum: 0.0
          maximum: 1000.0
          title: Page Limit
          type: integer
      - examples:
          example:
            value: 100
        in: query
        name: offset
        required: false
        schema:
          default: 0
          minimum: 0.0
          title: Offset
          type: integer
      - examples:
          example:
            value: '2023-01-01'
        in: query
        name: indexed_start_date
        required: false
        schema:
          format: date
          title: Indexed Start Date
          type: string
      - examples:
          example:
            value: '2023-12-31'
        in: query
        name: indexed_end_date
        required: false
        schema:
          format: date
          title: Indexed End Date
          type: string
      - description: A valid json object with property name and value.
        in: query
        name: metadata
        required: false
        schema:
          description: A valid json object with property name and value.
          title: Metadata
          type: string
      - description: Specifies the proper data partition id
        examples:
          example:
            value: opendes
        in: header
        name: data-partition-id
        required: true
        schema:
          description: Specifies the proper data partition id
          title: data-partition-id
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error

components:
  schemas:
    HTTPValidationError:
      properties:
        errors:
          app_name: Errors
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
      title: HTTPValidationError
      type: object
    InfoResponse:
      properties:
        app_version:
          title: App Version
          type: string
        branch:
          title: Branch
          type: string
        build_time:
          title: Build Time
          type: string
        commit_id:
          title: Commit Id
          type: string
        commit_message:
          title: Commit Message
          type: string
        name:
          title: Name
          type: string
        release_version:
          title: Release Version
          type: string
      title: InfoResponse
      type: object
    StorageUpsertResponse:
      properties:
        record_count:
          title: Record Count
          type: integer
        record_id_versions:
          items:
            type: string
          title: Record Id Versions
          type: array
        skipped_record_count:
          title: Skipped Record Count
          type: integer
      required:
      - record_count
      - record_id_versions
      - skipped_record_count
      title: StorageUpsertResponse
      type: object
    ValidationError:
      properties:
        loc:
          app_name: Location
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
        msg:
          app_name: Message
          type: string
        type:
          app_name: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http

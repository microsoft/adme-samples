      - trajectoryCRS
      - unitDls
      - unitXY
      - unitZ
      type: object
    FeatureFlagState:
      properties:
        enabled:
          type: boolean
        name:
          type: string
        partition:
          type: string
        source:
          type: string
      type: object
    GeoJsonBase:
      discriminator:
        propertyName: type
      properties:
        bbox:
          items:
            format: double
            type: number
          type: array
        geoJsonVariantInternal:
          enum:
          - GEO_JSON
          - ANY_CRS_GEO_JSON

          type: string
        VerticalUnitID:
          type: string
        bbox:
          items:
            format: double
            type: number
          type: array
        features:
          items:
            $ref: '#/components/schemas/GeoJsonFeature'
          type: array
        geoJsonVariantInternal:
          enum:
          - GEO_JSON
          - ANY_CRS_GEO_JSON
          type: string
          writeOnly: true
        persistableReferenceCrs:
          type: string
        persistableReferenceUnitZ:
          type: string
        properties: {}
        type:
          minLength: 1
          type: string
      required:

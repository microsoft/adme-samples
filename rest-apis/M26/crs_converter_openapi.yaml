      - type
      type: object
    GeoJsonGeometryCollection:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          geometries:
            items:
              oneOf:
              - $ref: '#/components/schemas/GeoJsonFeature'
              - $ref: '#/components/schemas/GeoJsonFeatureCollection'
              - $ref: '#/components/schemas/GeoJsonGeometryCollection'
              - $ref: '#/components/schemas/GeoJsonLineString'
              - $ref: '#/components/schemas/GeoJsonMultiLineString'
              - $ref: '#/components/schemas/GeoJsonMultiPoint'
              - $ref: '#/components/schemas/GeoJsonMultiPolygon'
              - $ref: '#/components/schemas/GeoJsonPoint'
              - $ref: '#/components/schemas/GeoJsonPolygon'
            type: array
        type: object
      required:
      - type
    GeoJsonLineString:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              items:
                format: double
                type: number
              type: array
            type: array
        type: object
      required:
      - type
    GeoJsonMultiLineString:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              items:
                items:
                  format: double
                  type: number
                type: array
              type: array
            type: array
        type: object
      required:
      - type
    GeoJsonMultiPoint:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              items:
                format: double
                type: number
              type: array
            type: array
        type: object
      required:
      - type
    GeoJsonMultiPolygon:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              items:
                items:
                  items:
                    format: double
                    type: number
                  type: array
                type: array
              type: array
            type: array
        type: object
      required:
      - type
    GeoJsonPoint:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              format: double
              type: number
            type: array
        type: object
      required:
      - type
    GeoJsonPolygon:
      allOf:
      - $ref: '#/components/schemas/GeoJsonBase'
      - properties:
          coordinates:
            items:
              items:
                items:
                  format: double
                  type: number
                type: array
              type: array
            type: array
        type: object

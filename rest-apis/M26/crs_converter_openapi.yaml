  /v4/convertTrajectory:
    post:
      description: "Convert a list of trajectory stations, given the unit and spatial\
        \ context and a reference point in 3D where MD==0. For survey MD, Incl, Azi\
        \ input, minimum curvature is used to calculate the local deviations and absolute\
        \ coordinates. For MD_dX,dY,dZ, the inverse minimum curvature is first applied\
        \ to compute Inc and Azi.\n\n **Interpolation Feature**: When `interpolate=true`\
        \ (default), additional stations can be generated at specified measured depths\
        \ using the `MD_i` parameter:\n - Use `MD_i.md_i` for explicit MD values,\
        \ e.g., [50, 75, 150]\n - Use `MD_i.md_interval` for regular spacing, e.g.,\
        \ 25 for every 25 units\n - Interpolated stations use minimum curvature interpolation\
        \ for inc/azi and position\n - Response stations include `original: true/false`\
        \ to distinguish survey vs interpolated\n - Set `interpolate=false` to process\
        \ only original survey stations (MD_i is ignored)\n\n ## Request Body Parameters\n\
        \n | Parameter | Type | Required | Description |\n |-----------|------|----------|-------------|\n\
        \ | **trajectoryCRS** | string | Yes | Coordinate reference system for the\
        \ reference point. Typically a projected CRS; if geographic CRS, unitXY must\
        \ be defined and azimuthReference must be TRUE_NORTH. |\n | **referencePoint**\
        \ | Point | Yes | The well surface location (x, y, z) where MD=0. Coordinates\
        \ are in trajectoryCRS units. |\n | **inputStations** | array | Yes | Array\
        \ of input trajectory stations. Required fields depend on inputKind. |\n |\
        \ **unitZ** | string | Yes | Unit of measure for vertical values (dz) and\
        \ measured depth. OSDU record ID or persistable reference JSON. |\n | **method**\
        \ | string | Yes | Computation method: 'AzimuthalEquidistant' (default) or\
        \ 'LMP' (Lee's Modified Proposal SPE96813). |\n | **azimuthReference** | string\
        \ | No | Reference for azimuth angles: TRUE_NORTH (TN) or GRID_NORTH (GN).\
        \ Default: TRUE_NORTH. |\n | **unitXY** | string | No | Unit for horizontal\
        \ displacements (dx, dy). Required for dX_dY_dZ input kinds. Auto-derived\
        \ from projected CRS if not specified. |\n | **unitMD** | string | No | Unit\
        \ for Measured Depth values. Defaults to unitZ if not specified. |\n | **inputKind**\
        \ | string | No | Input format: MD_Incl_Azim (default), MD_dX_dY_dZ, dX_dY_dZ,\
        \ MD_Incl, MD_X_Y_Z, X_Y_Z. |\n | **interpolate** | boolean | No | When true\
        \ (default), interpolates stations at MD_i depths. When false, only original\
        \ stations processed. |\n | **MD_i** | object | No | Interpolation specification:\
        \ md_i (array of specific depths) or md_interval (regular spacing). |\n\n\
        \ ## Input Station Fields (TrajectoryStationInV4)\n\n | Field | Description\
        \ |\n |-------|-------------|\n | **md** | Measured Depth - distance along\
        \ wellbore from reference point. Unit: unitMD or unitZ. |\n | **inclination**\
        \ | Wellbore angle from vertical: 0\xC2\xB0=down, 90\xC2\xB0=horizontal, 180\xC2\
        \xB0=up. |\n | **azimuth** | Direction angle: 0\xC2\xB0/360\xC2\xB0=North,\
        \ 90\xC2\xB0=East, 180\xC2\xB0=South, 270\xC2\xB0=West. Reference per azimuthReference.\
        \ |\n | **dx** | East-West displacement from reference point. Positive=East.\
        \ Unit: unitXY. |\n | **dy** | North-South displacement from reference point.\
        \ Positive=North. Unit: unitXY. |\n | **dz** | True Vertical Depth from reference\
        \ point. Positive=deeper. Unit: unitZ. |"
      operationId: convertTrajectory
      parameters:
      - description: Tenant Id
        in: header
        name: data-partition-id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertTrajectoryRequestV4'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertTrajectoryResponseV4'
          description: OK
      security:
      - Authorization: []
      summary: Convert trajectory stations
      tags:
      - Convert

components:
  schemas:
    AbstractAnyCrsFeatureCollection:
      properties:
        CoordinateReferenceSystemID:
          type: string
        features:
          items:
            $ref: '#/components/schemas/AbstractFeature'
          type: array
        persistableReferenceCrs:
          type: string
        type:
          type: string
      type: object
    AbstractBinGrid:
      properties:
        ABCDBinGridSpatialLocation:
          $ref: '#/components/schemas/AbstractSpatialLocation'
        BinGridDefinitionMethodTypeID:
          type: string
        BinGridName:
          type: string
        BinGridTypeID:
          type: string
        CoveragePercent:
          format: double
          type: number
        P6BinGridOriginEasting:
          format: double
          type: number
        P6BinGridOriginI:
          format: double
          type: number
        P6BinGridOriginJ:
          format: double
          type: number
        P6BinGridOriginNorthing:
          format: double
          type: number
        P6BinNodeIncrementOnIaxis:
          format: int32
          type: integer
        P6BinNodeIncrementOnJaxis:
          format: int32
          type: integer
        P6BinWidthOnIaxis:
          format: double
          type: number
        P6BinWidthOnJaxis:
          format: double
          type: number
        P6MapGridBearingOfBinGridJaxis:
          format: double
          type: number
        P6ScaleFactorOfBinGrid:
          format: double
          type: number
        P6TransformationMethod:
          format: int32
          type: integer
        SourceBinGridAppID:
          type: string
        SourceBinGridID:
          format: int32
          type: integer
      type: object
    AbstractFeature:
      properties:
        geometry:
          $ref: '#/components/schemas/Geometry'
        properties:
          $ref: '#/components/schemas/PropertiesBinGridCorners'
        type:
          type: string
      type: object
    AbstractFeatureCollection:
      properties:
        features:
          items:
            $ref: '#/components/schemas/AbstractFeature'
          type: array
        type:
          type: string
      type: object
    AbstractSpatialLocation:
      properties:
        AppliedOperations:
          items:
            type: string
          type: array
        AsIngestedCoordinates:
          $ref: '#/components/schemas/AbstractAnyCrsFeatureCollection'
        CoordinateQualityCheckDateTime:
          type: string
        CoordinateQualityCheckPerformedBy:
          type: string
        CoordinateQualityCheckRemarks:
          items:
            type: string
          type: array
        QualitativeSpatialAccuracyTypeID:
          type: string
        QuantitativeAccuracyBandID:
          type: string
        SpatialGeometryTypeID:
          type: string
        SpatialLocationCoordinatesDate:
          type: string
        SpatialParameterTypeID:
          type: string
        Wgs84Coordinates:
          $ref: '#/components/schemas/AbstractFeatureCollection'
      type: object
    AppError:
      properties:
        code:
          format: int32
          type: integer
        message:
          type: string
        reason:
          type: string
      type: object
    ConnectedOuterService:
      properties:
        name:
          type: string
        version:
          type: string
      type: object
    ConvertBinGridRequest:
      properties:
        inBinGrid:
          $ref: '#/components/schemas/AbstractBinGrid'
        toCRS:
          type: string
      type: object
    ConvertBinGridResponse:
      properties:
        AppliedOperations:
          items:
            type: string
          type: array
        maxMisLocation:
          $ref: '#/components/schemas/MaxMisLocation'
        outBinGrid:
          $ref: '#/components/schemas/AbstractBinGrid'
      type: object
    ConvertGeoJsonRequest:
      description: Request to convert a GeoJSON FeatureCollection or AnyCrsFeatureCollection
        from WGS 84 or 'AnyCrsFeatureCollection.persistableReferenceCrs to a target
        CRS.' to a target CRS
      properties:
        featureCollection:
          $ref: '#/components/schemas/GeoJsonFeatureCollection'
          description: The GeoJSON FeatureCollection or AnyCrsFeatureCollection structure
            to be converted/transformed. GeoJSON is always based on WGS 84; AnyCrsFeatureCollection
            carries the CRS context in the persistableReferenceCrs property. GeoJSON
            WGS 84 or the persistableReferenceCrs are taken as the 'fromCRS'.
        toCRS:
          description: Target CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
        toUnitZ:
          description: 'Optional: the target Z-unit for the z-axis scaling.'
          example: '{'
          type: string
      required:
      - featureCollection
      - toCRS
      type: object
    ConvertGeoJsonRequestV4:
      description: Request to convert a GeoJSON FeatureCollection or AnyCrsFeatureCollection
        from WGS 84 or 'AnyCrsFeatureCollection.persistableReferenceCrs to a target
        CRS.' to a target CRS
      properties:
        featureCollection:
          $ref: '#/components/schemas/GeoJsonFeatureCollection'
          description: The GeoJSON FeatureCollection or AnyCrsFeatureCollection structure
            to be converted/transformed. GeoJSON is always based on WGS 84; AnyCrsFeatureCollection
            carries the CRS context in the persistableReferenceCrs property. GeoJSON
            WGS 84 or the persistableReferenceCrs are taken as the 'fromCRS'.
        toCRS:
          description: Target CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
        toUnitZ:
          description: 'Optional: the target Z-unit for the z-axis scaling.'
          example: '{'
          type: string
        transformation:
          description: 'Explicit Transformation as persistable reference string or
            record id, its optional and if given it will override Bound Transformation '
          example: 'osdu:reference-data--CoordinateTransformation:EPSG::15851:'
          type: string
      required:
      - featureCollection
      - toCRS
      type: object
    ConvertGeoJsonResponse:
      description: Response of a CRS conversion/transformation operation involving
        GeoJSON FeatureCollection or AnyCrsFeatureCollection.
      properties:
        featureCollection:
          $ref: '#/components/schemas/GeoJsonFeatureCollection'
          description: The converted GeoJSON FeatureCollection or AnyCrsFeatureCollection
            with 'toCRS' context; length and order of the structure is the same as
            in the request. Points, which failed to convert, are returned as NaN.
        operationsApplied:
          description: The list of operations performed on the points as a list of
            strings
          items:
            type: string
          type: array
        successCount:
          description: The number of coordinates in the GeoJSON FeatureCollection
            or AnyCrsFeatureCollection successfully converted/transformed. If this
            number is less than totalCount then conversion/transformation errors have
            occurred.
          type: string
        totalCount:
          description: The total number of coordinates in the GeoJSON FeatureCollection
            or AnyCrsFeatureCollection.
          type: string
      type: object
    ConvertPointsRequest:
      description: Request to convert a set of points from a source CRS to a target
        CRS
      properties:
        fromCRS:
          description: Source CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
        points:
          description: List of points to be converted
          example:
          - x: -61.04340628871454
            y: 10.673103179456877
            z: 0
          items:
            $ref: '#/components/schemas/Point'
          minItems: 1
          type: array
        toCRS:
          description: Target CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
      required:
      - fromCRS
      - points
      - toCRS
      type: object
    ConvertPointsRequestV4:
      description: Request to convert a set of points from a source CRS to a target
        CRS
      properties:
        fromCRS:
          description: Source CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
        points:
          description: List of points to be converted
          example:
          - x: -61.04340628871454
            y: 10.673103179456877
            z: 0
          items:
            $ref: '#/components/schemas/Point'
          minItems: 1
          type: array
        toCRS:
          description: Target CRS as persistable reference string
          example: '{'
          minLength: 1
          type: string
        transformation:
          description: CRS Transform
          example: '{'
          type: string
      required:
      - fromCRS
      - points
      - toCRS
      type: object
    ConvertPointsResponse:
      description: Response of a CRS conversion/transformation operation
      properties:
        operationsApplied:
          description: The list of operations performed on the points as a list of
            strings
          items:
            type: string
          type: array
        points:
          description: Converted points; length and order of the array is the same
            as in the request. Points, which failed to convert, are returned as NaN.
          items:
            $ref: '#/components/schemas/Point'
          type: array
        successCount:
          description: Number of points successfully converted. If the number is less
            than the request array length conversion/transformation failures occurred.
          type: string
      type: object
    ConvertTrajectoryRequest:
      description: Input trajectory data structure; contains the context (crs, units,
        azimuth reference, method)
      properties:
        azimuthReference:
          description: 'Reference direction for azimuth angles. TRUE_NORTH (TN): measured
            from geographic true north. GRID_NORTH (GN): measured from map projection
            grid north. The difference is the grid convergence angle.'
          example: TRUE_NORTH
          minLength: 1
          type: string
        inputKind:
          description: 'Format of input data: MD_Incl_Azim (default) - measured depth
            with inclination and azimuth angles. MD_dX_dY_dZ - measured depth with
            local deviations. dX_dY_dZ - deviations only (MD computed via inverse
            minimum curvature). MD_Incl - inclination-only surveys (no azimuth).'
          example: MD_Inclination_Azimuth
          type: string
        inputStations:
          description: The array of input trajectory stations
          example:
          - azimuth: 0
            inclination: 0
            md: 0
          - azimuth: 0
            inclination: 0
            md: 1000
          - azimuth: 0
            inclination: 90
            md: 2000
          - azimuth: 0
            inclination: 90
            md: 3000
          - azimuth: 90
            inclination: 90
            md: 5000
          - azimuth: 90
            inclination: 90
            md: 6000
          minLength: 1
          type: string
        interpolate:
          description: When true (default), interpolates additional stations at MD
            values specified in MD_i. When false, only original input stations are
            processed and MD_i is ignored.
          example: 'True'
          type: string
        method:
          description: 'Computation method: ''AzimuthalEquidistant'' (default) - standard
            method using azimuthal equidistant projection centered at well location.
            ''LMP'' - Lee''s Modified Proposal (SPE96813) for improved accuracy at
            extreme latitudes.'
          example: AzimuthalEquidistant
          minLength: 1
          type: string
        referencePoint:
          $ref: '#/components/schemas/Point'
          description: The 3D reference point in the 'trajectoryCRS' where MD==0.
        trajectoryCRS:
          description: Coordinate reference system for the reference point; typically
            the CRS is a projected CRS; if a geographic CRS is provided, the unitXY
            must be defined and the azimuthReference must be TRUE_NORTH.
          example: '{'
          minLength: 1
          type: string
        unitXY:
          description: Unit of measure for horizontal displacements (dx, dy). Required
            for dX_dY_dZ input kinds. Can be OSDU record ID (e.g., 'osdu:reference-data--UnitOfMeasure:m:')
            or persistable reference JSON. Auto-derived from projected CRS if not
            specified.
          example: '{'
          type: string
        unitZ:
          description: Unit of measure for vertical values (dz) and measured depth.
            Required field. Can be OSDU record ID (e.g., 'osdu:reference-data--UnitOfMeasure:m:')
            or persistable reference JSON.
          example: '{'
          minLength: 1
          type: string
      required:
      - azimuthReference
      - inputStations
      - method
      - trajectoryCRS
      - unitZ
      type: object
    ConvertTrajectoryRequestV4:
      properties:
        MD_i:
          $ref: '#/components/schemas/MinimumDepthInterval'
          description: Specifies measured depths where additional trajectory stations
            should be interpolated. Only used when 'interpolate' is true. Provide
            either explicit MD values (md_i array) or a regular interval (md_interval).
        azimuthReference:
          description: 'Reference direction for azimuth angles. TRUE_NORTH (TN): measured
            from geographic true north. GRID_NORTH (GN): measured from map projection
            grid north. The difference is the grid convergence angle.'
          example: TRUE_NORTH
          type: string
        inputKind:
          description: 'Format of input data: MD_Incl_Azim (default) - measured depth

          title: Describe
      - description: "\n\nThe \"filter\" query parameter allows clients to filter\
          \ by rows, it selects rows data following the pattern `$column_name:$operator:$value`.\
          \  \nThe supported operators are : lt, lte, gt, gte, eq, neq, in.  \n\n\
          Note: If the column name contains ':', enclose it in double quotation marks\
          \ (\").\n"
        in: query
        name: filter
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: "\n\nThe \"filter\" query parameter allows clients to filter\
            \ by rows, it selects rows data following the pattern `$column_name:$operator:$value`.\
            \  \nThe supported operators are : lt, lte, gt, gte, eq, neq, in.  \n\n\
            Note: If the column name contains ':', enclose it in double quotation\

      - in: path
        name: version
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Statistics computation started
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /ddms/v3/wellpressuretestrawmeasurement/{record_id}/versions/{version}/data:
    get:
      description: "Returns the data of a specific version according to the specified\
        \ query parameters.\nMultiple media types response are available (\"application/json\"\
        , \"application/x-parquet\").  \nThe desired format can be specify in the\
        \ \"Accept\" header, default is Parquet.  \n\nWhen bulk statistics are requested\
        \ using __describe__ query parameter, the response is always provided in JSON.\
        \  \nThe requested columns must not exceed 3000. \nThe query parameter __curves__\
        \ can be use to limit the number of columns.  \n\nRequired roles: 'users.datalake.viewers'\
        \ or 'users.datalake.editors' or 'users.datalake.admins'.\nIn addition, users\
        \ must be a member of data groups to access the data.\n\n**Important**: In\
        \ order to minimize reading time.\n\n1. Partial reading\n    - Select only\
        \ needed columns\n    \nNote: using curves filtering has a cost, use it only\
        \ if it reduces significantly the amount of retrieved bulk data.\n\n2. Full\
        \ reading\n    - Try to read all the curves, if those errors are returned\
        \ go to next steps:\n        - HTTP 400 \"Too many columns requested\"\n \
        \       - HTTP 400 \"Too many values requested\"\n        - HTTP 413 \"the\
        \ resource requested exceeds the limit\" (When WDDMS worker are enabled)\n\
        \    - Get curve names and number of rows per curve by using describe parameter\n\
        \       - Each request should fetch as many as columns it is possible until\
        \ upper limits are reached (> 10 millions values or > 3000 columns)"
      operationId: get__ddms_v3_wellpressuretestrawmeasurement__record_id__versions__version__data
      parameters:
      - in: path
        name: record_id
        required: true
        schema:
          title: Record Id
          type: string
      - in: path
        name: version
        required: true
        schema:
          title: Version
          type: integer
      - description: The number of rows that are to be skipped and not included in
          the result.
        in: query
        name: offset
        required: false
        schema:
          anyOf:
          - minimum: 0
            type: integer
          - type: 'null'
          description: The number of rows that are to be skipped and not included
            in the result.
          examples:
          - 5
          title: Offset
      - description: The maximum number of rows to be returned.
        in: query
        name: limit
        required: false
        schema:
          anyOf:
          - minimum: 1
            type: integer
          - type: 'null'
          description: The maximum number of rows to be returned.
          examples:
          - 100
          title: Limit
      - description: Filters curves. List of curves to be returned. The curves are
          returned in the same order as it is given.
        in: query
        name: curves
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filters curves. List of curves to be returned. The curves are
            returned in the same order as it is given.
          examples:
            all:
              summary: Select all curves
              value: ''
            array-curve:
              summary: Select one specific curve of an array
              value: ARR[100]
            array-slice:
              summary: Select a slice of array curves
              value: ARR[10:50]
            array-slice-plus-curve:
              summary: Select slice of array + another curve(s)
              value: MD,ARR[50:55],GR
            basic:
              summary: Select specific curves
              value: MD,GR
          title: Curves
      - description: The "describe" query option allows clients to request a description
          of the matching result. (number of rows, columns name)
        in: query
        name: describe
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          default: false
          description: The "describe" query option allows clients to request a description
            of the matching result. (number of rows, columns name)
          examples:
          - 'false'
          title: Describe
      - description: "\n\nThe \"filter\" query parameter allows clients to filter\
          \ by rows, it selects rows data following the pattern `$column_name:$operator:$value`.\
          \  \nThe supported operators are : lt, lte, gt, gte, eq, neq, in.  \n\n\
          Note: If the column name contains ':', enclose it in double quotation marks\
          \ (\").\n"
        in: query
        name: filter
        required: false
        schema:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: "\n\nThe \"filter\" query parameter allows clients to filter\
            \ by rows, it selects rows data following the pattern `$column_name:$operator:$value`.\
            \  \nThe supported operators are : lt, lte, gt, gte, eq, neq, in.  \n\n\
            Note: If the column name contains ':', enclose it in double quotation\
            \ marks (\").\n"
          examples:
            double-md-filter:
              summary: Select 'MD' > 1000 and 'MD' < 42000
              value:
              - MD:gt:1000
              - MD:lt:42000
            simple-md-filter:
              summary: Select rows when column 'MD' values >= 1000
              value:
              - MD:gte:1000
            simple-md-filter-2:
              summary: Select rows when 'MD' column values <= 1000
              value:
              - MD:lte:1000
          title: Filter
      - description: format for JSON only.

  /ddms/v3/welllogs/{record_id}/sessions:
    get:
      operationId: get__ddms_v3_welllogs__record_id__sessions
      parameters:
      - in: path
        name: record_id
        required: true
        schema:
          title: Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Session'
                title: Response List Session Ddms V3 Welllogs  Record Id  Sessions
                  Get
                type: array
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: list session of the given record.
      tags:
      - WellLog
    post:
      description: "Initiate a session based on record version provided. The session\
        \ is isolated from any other modifications. \nInside a session, individual\
        \ chunk doesn't generate new individual record version.  \n \nA new single\
        \ version is created only at session completion 'aggregating' all updates.\n\
        \ A typical workflow is:\n 1. create a session\n 2. send X chunks (can be\
        \ parallelized)\n 3. commit the session  \n   \nSession has an expiry time.\n\
        If the session is not completed before, it's automatically dropped. \nThe\
        \ session duration is specified in the request but cannot exceeds 24 hours.\n\
        \n**Note**: For `WellLog` and `WellboreTrajectory` kind, the attribute **extendedLoadCompleted**\
        \ can be set into session.meta \nto set \"record.data.IsExtendedLoad\" to\
        \ **False** after completing the session \n(with _PATCH /{record_id}/sessions/{session_id}_\
        \ API). See swagger examples for details."
      operationId: post__ddms_v3_welllogs__record_id__sessions
      parameters:
      - in: path
        name: record_id
        required: true
        schema:
          title: Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataSessionRequest'
              examples:
                full:
                  summary: Start update session at specific record version
                  value:
                    fromVersion: 123456789
                    mode: update
                overwrite:
                  summary: Start overwrite session
                  value:
                    mode: overwrite
                set session meta:
                  summary: Start update session and session meta attributes
                  value:
                    meta:
                      extendedLoadCompleted: true
                    mode: update
                update:
                  summary: Start update session
                  value:
                    mode: update
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Create a new session on the given record for writing bulk data.
      tags:
      - WellLog
  /ddms/v3/welllogs/{record_id}/sessions/{session_id}:
    get:
      operationId: get__ddms_v3_welllogs__record_id__sessions__session_id_

    post:
      description: "Writes data to the associated record. It creates a new version.\n\
        Payload is expected to contain the entire bulk which will replace as latest\
        \ version\nany previous bulk. Previous bulk versions are accessible via the\
        \ get bulk data version API.\nSupport JSON and Parquet format ('Content_Type'\
        \ must be set accordingly).\nSupport http chunked encoding transfer.\n\nRequired\
        \ roles: 'users.datalake.editors' or 'users.datalake.admins\n\n**Important**:\
        \ In order to minimize writing time, it's necessary to:  \n- Double check\
        \ whether bulk data is big enough to be sent with chunking APIs: meaning >\
        \ 10 millions values or > 3000 columns\n    - If no, use instead POST /ddms/v3/welllogs/MY_RECORD_ID/data\
        \ API\n- Ensure all curve's values are in the same chunk to be sent\n- Each\
        \ chunk should contain as many as columns it is possible until upper limits\
        \ are reached (> 10 millions values or > 3000 columns)"
      operationId: post__ddms_v3_ppfgdataset__record_id__data
      parameters:
      - in: path
        name: record_id
        required: true
        schema:
          title: Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              example: "{\n  \"columns\":[\n    \"Ref\",\n    \"col_1\",\n    \"col_2\"\
                \n  ],\n  \"index\":[\n    0,\n    1,\n    2,\n    3,\n    4\n  ],\n\
                \  \"data\":[\n    [\n      0.0,\n      1111.1,\n      2222.1\n  \
                \  ],\n    [\n      0.5,\n      1111.2,\n      2222.2\n    ],\n  \
                \  [\n      1.0,\n      1111.3,\n      2222.3\n    ],\n    [\n   \
                \   1.5,\n      1111.4,\n      2222.4\n    ],\n    [\n      2.0,\n\
                \      1111.5,\n      2222.5\n    ]\n  ]\n}"
          application/x-parquet:
            schema:
              format: binary
              type: string
        description: "\nContains the data corresponding to the dataframe. The header\
          \ \"Content-Type\" must be set accordingly to the format sent:\n<br/>&nbsp;**Parquet**\
          \ format(*application/x-parquet*): see [Apache parquet website](https://parquet.apache.org/).\n\
          <br/>&nbsp;**JSON** format (*application/json*): see [Pandas.Dataframe JSON\
          \ format orient \"split\"](https://pandas.pydata.org/pandas-docs/stable/reference/api/pandas.DataFrame.to_json.html).\n\
          .\n Examples in JSON for data with 5 rows and 3 columns: \n<br/>`{\"columns\"\
          :[\"Ref\",\"col_1\",\"col_2\"],\"index\":[0,1,2,3,4],\"data\":[[0.0,1111.1,2222.1],[0.5,1111.2,2222.2],[1.0,1111.3,2222.3],[1.5,1111.4,2222.4],[2.0,1111.5,2222.5]]}`<br/>&nbsp;"
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error

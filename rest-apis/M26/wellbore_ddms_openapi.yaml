components:
  schemas:
    AboutResponse:
      properties:
        buildNumber:
          anyOf:
          - type: string
          - type: 'null'
          title: Buildnumber
        cloudEnvironment:
          anyOf:
          - type: string
          - type: 'null'
          title: Cloudenvironment
        release:
          anyOf:
          - type: string
          - type: 'null'
          title: Release
        service:
          anyOf:
          - type: string
          - type: 'null'
          title: Service
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
      title: AboutResponse
      type: object
    BulkDataStatisticsResponse:
      description: Response for bulk data statistics and its meta-data
      example:
        computationStartDatetime: '2022-05-18T16:22:16.010582'
        computationStatus: complete
        data:
          ARR[0]:
            10%: '9.0'
            50%: '451.0'
            90%: '893.0'
            max: '999.0'
            mean: '450.8438'
            min: '-100.0'
            nonAbsentValuesCount: '100000.0'
            std: '318.27778186518816'
            totalCount: '100000'
          ARR[1]:
            10%: '10.0'
            50%: '446.0'
            90%: '889.0'
            max: '999.0'
            mean: '448.06855'
            min: '-100.0'
            nonAbsentValuesCount: '100000.0'
            std: '316.8023859891449'
            totalCount: '100000'
          ARR[2]:
            10%: '11.0'
            50%: '453.0'
            90%: '890.0'
            max: '999.0'
            mean: '451.01309'
            min: '-100.0'
            nonAbsentValuesCount: '100000.0'
            std: '317.40833668820653'
            totalCount: '100000'
          ARR[3]:
            10%: '8.900000000001455'
            50%: '450.0'
            90%: '890.0'
            max: '999.0'
            mean: '449.16661'
            min: '-100.0'
            nonAbsentValuesCount: '100000.0'
            std: '317.7767589547625'
            totalCount: '100000'
        recordId: osdu:work-product-component--WellLog:6d9c95c972254bbbaeaecbfa67fd1cf3
        recordVersion: '1998222529528913770053504387865218642'
      properties:
        computationStartDatetime:
          format: date-time
          title: Statistics computation start datetime in ISO format
          type: string
        computationStatus:
          $ref: '#/components/schemas/BulkStatisticsStatus'
        data:
          additionalProperties:
            $ref: '#/components/schemas/CurveStatistics'
          examples:
          - CurveName:
              10%: '9.0'
              50%: '451.0'
              90%: '893.0'
              max: '999.0'
              mean: '450.8438'
              min: '-100.0'
              nonAbsentValuesCount: '100000.0'
              std: '318.27778186518816'
              totalCount: '100000'
          title: Curves statistics' values
          type: object
        recordId:
          title: Recordid
          type: string
        recordVersion:
          title: Recordversion
          type: integer
      required:
      - computationStartDatetime
      - recordId
      - recordVersion
      - computationStatus
      - data
      title: BulkDataStatisticsResponse
      type: object
    BulkStatisticsStatus:
      description: Status available for computation of bulk data statistics
      enum:
      - error
      - started
      - running
      - complete
      title: BulkStatisticsStatus
      type: string
    Catalog:
      properties:
        family_catalog:
          items:
            $ref: '#/components/schemas/CatalogItem'
          title: Family Catalog
          type: array
        main_family_catalog:
          anyOf:
          - items:
              $ref: '#/components/schemas/MainFamilyCatalogItem'
            type: array
          - type: 'null'
          title: Main Family Catalog
      required:
      - family_catalog
      title: Catalog
      type: object
    CatalogItem:
      properties:
        family:
          anyOf:
          - type: string
          - type: 'null'
          default: ''
          title: Family
        rule:
          title: Rule
          type: string
        unit:
          title: Unit
          type: string
      required:
      - unit
      - rule
      title: CatalogItem
      type: object
    CatalogRecord:
      example:
        acl:
          owners:
          - abc@domain.com, cde@domain.com
          viewers:
          - abc@domain.com, cde@domain.com
        data:
          family_catalog:
          - family: Medium Resistivity
            rule: MEDR
            unit: ohm.m
          main_family_catalog:
          - Family: Medium Resistivity
            MainFamily: Resistivity
            Unit: OHMM
        legal:
          legaltags:
          - opendes-public-usa-dataset-1
          otherRelevantDataCountries:
          - US
      properties:
        acl:
          $ref: '#/components/schemas/StorageAcl'
        data:
          $ref: '#/components/schemas/Catalog'
        legal:
          $ref: '#/components/schemas/Legal'
      required:
      - acl
      - legal
      - data
      title: CatalogRecord
      type: object
    CommitSessionResponse:
      example:
        createdTime: '2021-03-07T15:49:01+00:00'
        expiry: '2021-03-08T15:49:01+00:00'
        fromVersion: 25686567113
        id: xx1234
        meta:
          creatorCustom: someValue
        mode: update
        recordId: opendes:log:991234
        state: open
        updatedTime: '2021-03-07T15:58:01+00:00'
        version: 123456789
      properties:
        createdTime:
          description: creation date
          format: date-time
          title: Createdtime
          type: string
        expiry:
          description: If the session is not committed before this dead line, session
            is automatically abandoned.
          format: date-time
          title: Expiry
          type: string
        fromVersion:
          description: record version on top of which the session is based.
          title: Fromversion
          type: integer
        id:
          description: identifier of the current session.
          format: uuid
          title: Id
          type: string
        meta:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: miscellaneous metadata associated to the session. The session
            creator can set some data here.
          title: Meta
        mode:
          $ref: '#/components/schemas/SessionUpdateMode'
          description: merge mode at commit. If 'update', existing data will be merged
            with the data sent during the session. If 'overrride', existing data will
            be ignored, the final result will only contains data sent within the session.
        recordId:
          description: identifier of the record of which the session is attached to.
          title: Recordid
          type: string
        state:
          $ref: '#/components/schemas/SessionState'
        updatedTime:
          description: updated date
          format: date-time
          title: Updatedtime
          type: string
        version:
          anyOf:
          - type: integer
          - type: 'null'
          description: Record version in case of successful commit
          examples:
          - 1562066009929332
          title: Version Number
      required:
      - id
      - recordId
      - fromVersion
      - mode
      - expiry
      - createdTime
      - updatedTime
      - state
      title: CommitSessionResponse
      type: object
    CreateDataSessionRequest:
      description: "Note:\nif fromVersion is provided, should we:\n    force mode\
        \ to 'update'\n    raise an error if mode is overwrite"
      properties:
        fromVersion:
          default: 0
          description: specify the version on top of which update will be applied.
            By default use the latest one (0). Not relevant if overwrite is set to
            True.
          title: Fromversion
          type: integer
        meta:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: dictionary all values, stored in the session
          title: Meta
        mode:
          $ref: '#/components/schemas/SessionUpdateMode'
          description: merge mode at commit. If 'update', existing data will be merged
            with the data sent during the session. If 'overwrite', existing data will
            be ignored, the final result will only contains data sent within the session.
        timeToLive:
          default: 1440
          description: optional - time to live in minutes.
          title: Timetolive
          type: integer
      required:
      - mode
      title: CreateDataSessionRequest
      type: object
    CreateUpdateRecordsResponse:
      properties:
        recordCount:
          anyOf:
          - type: integer
          - type: 'null'
          title: Recordcount
        recordIdVersions:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Recordidversions
        recordIds:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Recordids
        skippedRecordIds:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Skippedrecordids
      title: CreateUpdateRecordsResponse
      type: object
    CurveStatistics:
      properties:
        10%:
          title: 10th percentiles
          type: string
        50%:
          title: 50th percentiles
          type: string
        90%:
          title: 90th percentiles
          type: string
        max:
          title: Maximum value
          type: string
        mean:
          title: Mean value
          type: string
        min:
          title: Minimum value
          type: string
        nonAbsentValuesCount:
          title: Number of valid values in the curve
          type: string
        std:
          title: Standard deviation value
          type: string
        totalCount:
          title: Number of values in the curve
          type: string
      required:
      - mean
      - std
      - min
      - 10%
      - 50%
      - 90%
      - max
      - totalCount
      - nonAbsentValuesCount
      title: CurveStatistics
      type: object
    DataframeBasicDescribe:
      properties:
        columnCount:
          title: Columncount
          type: integer
        columns:
          description: list of column. May be truncated if too many columns, then
            contains the firsts and lasts once
          items:
            type: string
          title: Columns
          type: array
        indexEnd:
          title: Indexend
          type: string
        indexStart:
          title: Indexstart
          type: string
        indexType:
          title: Indextype
          type: string
        rowCount:
          title: Rowcount
          type: integer
      required:
      - rowCount
      - columnCount
      - columns
      - indexStart
      - indexEnd
      - indexType
      title: DataframeBasicDescribe
      type: object
    GuessRequest:
      example:
        description: LDTD Gamma Ray
        label: GRD
        log_unit: GAPI
      properties:
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        label:
          title: Label
          type: string
        log_unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Log Unit
      required:
      - label
      title: GuessRequest
      type: object
    GuessResponse:
      properties:
        base_unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Base Unit
        family:
          anyOf:
          - type: string
          - type: 'null'
          title: Family
        family_type:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Family Type
        log_unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Log Unit
      title: GuessResponse
      type: object
    HTTPValidationError:
      properties:
        errors:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Errors
          type: array
      title: HTTPValidationError
      type: object
    JSONOrient:
      enum:
      - split
      - columns
      title: JSONOrient
      type: string
    Legal:
      properties:
        legaltags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Legaltags
        otherRelevantDataCountries:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Otherrelevantdatacountries
      title: Legal
      type: object
    MainFamilyCatalogItem:
      properties:
        Family:
          title: Family
          type: string
        MainFamily:
          title: Mainfamily
          type: string
        Unit:
          title: Unit
          type: string
      required:
      - MainFamily
      - Family
      - Unit
      title: MainFamilyCatalogItem
      type: object
    Record:
      properties:
        acl:
          $ref: '#/components/schemas/StorageAcl'
        ancestry:
          anyOf:
          - $ref: '#/components/schemas/RecordAncestry'
          - type: 'null'
        createTime:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Createtime
        createUser:
          anyOf:
          - type: string
          - type: 'null'
          title: Createuser
        data:
          additionalProperties: true
          title: Data
          type: object
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        kind:
          title: Kind
          type: string
        legal:
          $ref: '#/components/schemas/Legal'
        meta:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Meta
        modifyTime:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Modifytime
        modifyUser:
          anyOf:
          - type: string
          - type: 'null'
          title: Modifyuser
        tags:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Tags
        version:
          anyOf:
          - type: integer
          - type: 'null'
          title: Version
      required:
      - kind
      - acl
      - legal
      - data
      title: Record
      type: object
    RecordAncestry:
      properties:
        parents:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Parents
      title: RecordAncestry
      type: object
    RecordVersions:
      properties:
        recordId:
          anyOf:
          - type: string
          - type: 'null'
          title: Recordid
        versions:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Versions
      title: RecordVersions
      type: object
    Session:
      description: 'model of session exposed  '
      example:
        createdTime: '2021-03-07T15:49:01+00:00'
        expiry: '2021-03-08T15:49:01+00:00'
        fromVersion: 25686567113
        id: xx1234
        meta:
          creatorCustom: someValue
        mode: update
        recordId: opendes:log:991234
        state: open
        updatedTime: '2021-03-07T15:58:01+00:00'
      properties:
        createdTime:
          description: creation date
          format: date-time
          title: Createdtime
          type: string
        expiry:
          description: If the session is not committed before this dead line, session
            is automatically abandoned.
          format: date-time
          title: Expiry
          type: string
        fromVersion:
          description: record version on top of which the session is based.
          title: Fromversion
          type: integer
        id:
          description: identifier of the current session.
          format: uuid
          title: Id
          type: string
        meta:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          description: miscellaneous metadata associated to the session. The session
            creator can set some data here.
          title: Meta
        mode:
          $ref: '#/components/schemas/SessionUpdateMode'
          description: merge mode at commit. If 'update', existing data will be merged
            with the data sent during the session. If 'overrride', existing data will
            be ignored, the final result will only contains data sent within the session.
        recordId:
          description: identifier of the record of which the session is attached to.
          title: Recordid
          type: string
        state:
          $ref: '#/components/schemas/SessionState'
        updatedTime:
          description: updated date
          format: date-time
          title: Updatedtime
          type: string
      required:
      - id
      - recordId
      - fromVersion
      - mode
      - expiry
      - createdTime
      - updatedTime
      - state
      title: Session
      type: object
    SessionState:
      enum:
      - open
      - committing
      - abandoning
      - committed
      - abandoned
      title: SessionState
      type: string
    SessionUpdateMode:
      enum:
      - overwrite
      - update
      title: SessionUpdateMode
      type: string
    StorageAcl:
      properties:
        owners:
          items:
            type: string
          title: Owners
          type: array
        viewers:
          items:
            type: string
          title: Viewers
          type: array
      required:
      - viewers
      - owners
      title: StorageAcl
      type: object
    UpdateSessionState:
      properties:
        state:
          $ref: '#/components/schemas/UpdateSessionStateValue'
          description: '`commit` or `abandon` a session'
      required:
      - state
      title: UpdateSessionState
      type: object
    UpdateSessionStateValue:
      enum:
      - commit
      - abandon
      title: UpdateSessionStateValue
      type: string
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VersionDetailsResponse:
      properties:
        buildNumber:
          anyOf:
          - type: string
          - type: 'null'
          title: Buildnumber
        details:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Details
        release:
          anyOf:
          - type: string
          - type: 'null'
          title: Release
        service:
          anyOf:
          - type: string
          - type: 'null'
          title: Service
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
      title: VersionDetailsResponse
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: build local
  title: Wellbore DDMS OSDU
  version: '0.29'
openapi: 3.0.0
paths:
  /about:
    get:
      operationId: get__about
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutResponse'
          description: Successful Response
        '500':
          description: Internal server error
      summary: Get About
      tags:
      - Wellbore DDMS
  /ddms/v3/ppfgdataset:
    post:
      operationId: create_or_update_osdu_record
      parameters:
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/Record'
              title: Input Records
              type: array
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUpdateRecordsResponse'
          description: Successful Response
        '400':
          description: Missing mandatory parameter or unknown parameter
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Create or update record using osdu schema
      tags:
      - PPFGDataset v3
  /ddms/v3/ppfgdataset/{osdu_record_id}:
    delete:
      operationId: delete_osdu_record
      parameters:
      - in: path
        name: osdu_record_id
        required: true
        schema:
          title: Osdu Record Id
          type: string
      - in: query
        name: purge
        required: false
        schema:
          default: false
          title: Purge
          type: boolean
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '204':
          description: Record deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Record not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Delete the record using id. The API performs a logical deletion of
        the given record. No recursive delete for OSDU kinds
      tags:
      - PPFGDataset v3
    get:
      operationId: get_osdu_record
      parameters:
      - in: path
        name: osdu_record_id
        required: true
        schema:
          title: Osdu Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Record not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Get the record using the provided recordID
      tags:
      - PPFGDataset v3
  /ddms/v3/ppfgdataset/{osdu_record_id}/versions:
    get:
      operationId: get_record_versions
      parameters:
      - in: path
        name: osdu_record_id
        required: true
        schema:
          title: Osdu Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordVersions'
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Record not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Get all versions of the provided record
      tags:
      - PPFGDataset v3
  /ddms/v3/ppfgdataset/{osdu_record_id}/versions/{version}:
    get:
      description: Get the specific version of object using its **id**.
      operationId: get_specific_record_version
      parameters:
      - in: path
        name: version
        required: true
        schema:
          title: Version
          type: integer
      - in: path
        name: osdu_record_id
        required: true
        schema:
          title: Osdu Record Id
          type: string
      - description: identifier of the data partition to query
        in: header
        name: data-partition-id
        required: false
        schema:
          description: identifier of the data partition to query
          minLength: 1
          title: data partition id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Record'
          description: Successful Response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Record not found
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          description: Internal server error
      security:
      - HTTPBearer: []
      summary: Get specific version for the provided OSDU record
      tags:
      - PPFGDataset v3
  /ddms/v3/ppfgdataset/{record_id}/data:
    get:
      description: "Returns the data according to the specified query parameters.\n\
        Multiple media types response are available (\"application/json\", \"application/x-parquet\"\
        ).  \nThe desired format can be specify in the \"Accept\" header, default\
        \ is Parquet.  \n\nWhen bulk statistics are requested using __describe__ query\
        \ parameter, the response is always provided in JSON.  \nThe requested columns\
        \ must not exceed 3000. \nThe query parameter __curves__ can be use to limit\
        \ the number of columns.  \n\nRequired roles: 'users.datalake.viewers' or\
        \ 'users.datalake.editors' or 'users.datalake.admins'.\nIn addition, users\
        \ must be a member of data groups to access the data.\n\n**Important**: In\
        \ order to minimize reading time.\n\n1. Partial reading\n    - Select only\
        \ needed columns\n    \nNote: using curves filtering has a cost, use it only\
        \ if it reduces significantly the amount of retrieved bulk data.\n\n2. Full\
        \ reading\n    - Try to read all the curves, if those errors are returned\
        \ go to next steps:\n        - HTTP 400 \"Too many columns requested\"\n \
        \       - HTTP 400 \"Too many values requested\"\n        - HTTP 413 \"the\
        \ resource requested exceeds the limit\" (When WDDMS worker are enabled)\n\
        \    - Get curve names and number of rows per curve by using describe parameter\n\
        \       - Each request should fetch as many as columns it is possible until\
        \ upper limits are reached (> 10 millions values or > 3000 columns)"
      operationId: get__ddms_v3_ppfgdataset__record_id__data
      parameters:
      - in: path
        name: record_id
        required: true
        schema:
          title: Record Id
          type: string
      - description: The number of rows that are to be skipped and not included in
          the result.
        in: query
        name: offset
        required: false
        schema:
          anyOf:
          - minimum: 0
            type: integer
          - type: 'null'
          description: The number of rows that are to be skipped and not included
            in the result.
          examples:
          - 5
          title: Offset
      - description: The maximum number of rows to be returned.
        in: query
        name: limit
        required: false
        schema:
          anyOf:
          - minimum: 1
            type: integer
          - type: 'null'
          description: The maximum number of rows to be returned.
          examples:
          - 100
          title: Limit
      - description: Filters curves. List of curves to be returned. The curves are
          returned in the same order as it is given.
        in: query
        name: curves
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filters curves. List of curves to be returned. The curves are
            returned in the same order as it is given.

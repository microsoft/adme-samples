<!-- HTML for static distribution bundle build -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="../dist/swagger-ui.css" />
    <link rel="icon" type="image/png" href="../dist/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="../dist/favicon-16x16.png" sizes="16x16" />
    <style>
      html
      {
        box-sizing: border-box;
        overflow: -moz-scrollbars-vertical;
        overflow-y: scroll;
      }

      *,
      *:before,
      *:after
      {
        box-sizing: inherit;
      }

      body
      {
        margin:0;
        background: #fafafa;
      }
    </style>
  </head>

  <body>
    <div id="swagger-ui"></div>

    <script src="../dist/swagger-ui-bundle.js" charset="UTF-8"> </script>
    <script src="../dist/swagger-ui-standalone-preset.js" charset="UTF-8"> </script>
    <script>
    // =====================================================================
    // Update LATEST_VERSION when a new milestone folder is added.
    // This is the ONLY place you need to change when moving to a new version.
    // =====================================================================
    var LATEST_VERSION = "M25";

    window.onload = function() {
    var idx = document.URL.indexOf('?');
    var params = document.URL.substring(idx + 1, document.URL.length).split('&');
    var page = params[0].split('=');
    var pageUrl = page[1]
    pageUrl = pageUrl.replaceAll("%22", "")

    // If the page parameter is just a filename (no path separators),
    // automatically resolve it to the latest version folder.
    if (pageUrl && pageUrl.indexOf('/') === -1) {
      pageUrl = "/adme-samples/rest-apis/" + LATEST_VERSION + "/" + pageUrl;
    }

      // Begin Swagger UI call region
      const ui = SwaggerUIBundle({
        url: pageUrl,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout"
      });
      // End Swagger UI call region

      window.ui = ui;
    };
  </script>
  </body>
</html>
